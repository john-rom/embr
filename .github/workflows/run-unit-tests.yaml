name: Unit Tests

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'
      - 'app/**'
      - 'boards/**'
      - 'platform/**'
      - 'src/**'
      - 'tests/**'
      - 'third_party/**'
      - 'CMakeLists.txt'
      - 'prj.conf'
      - '*.conf'

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Run unit tests in nrf_2.4.0 Docker container
        run: |
          docker run --rm \
          -e GITHUB_RUN_ID \
          -e GITHUB_RUN_ATTEMPT \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          nrf_2.4.0:2.4.0 \
          bash -lc '
            set -euo pipefail
            source /ncs/zephyr/zephyr-env.sh
            west twister -T tests/unit \
              -O /tmp/twister-out-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          '
