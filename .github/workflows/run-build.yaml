name: Build

on:
  workflow_run:
    workflows: ["Unit Tests"]
    types:
      - completed

jobs:
  build:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware in nrf_2.4.0 Docker container
        run: |
          docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          nrf_2.4.0:2.4.0 \
          bash -lc '
            set -euo pipefail
            source /ncs/zephyr/zephyr-env.sh
            west build -p always -b thingy53_nrf5340_cpuapp \
              -d /tmp/embr-build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT} .
          '
